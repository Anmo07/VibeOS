# =============================================================
# System Customizations
# =============================================================

[customizations]
hostname = "vibeos"

[customizations.kernel]
append = "quiet splash"

# Default user for the live session
[[customizations.user]]
name = "liveuser"
shell = "/bin/zsh"
groups = ["wheel"]

# Enable essential services
[customizations.services]
enabled = ["firewalld", "bluetooth", "power-profiles-daemon", "NetworkManager"]
disabled = ["NetworkManager-wait-online", "sshd"]

# Timezone
[customizations.timezone]
timezone = "UTC"

# Locale
[customizations.locale]
languages = ["en_US.UTF-8"]
keyboard = "us"

# Firewall
[customizations.firewall]
ports = []

[customizations.firewall.services]
enabled = ["dhcpv6-client", "mdns", "ssh"]
